# Render Blueprint: single Docker web service (FastAPI backend + static frontend).
# Deploy via Render dashboard -> "New +" -> "Blueprint" pointed at this repo.
services:
  - type: web
    name: ats-bidder
    runtime: docker
    plan: free                 # 512MB RAM, spins down on idle. Bump to "starter" if Chromium OOMs.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # Required: your OpenAI-compatible API key (Fireworks by default). Set in the dashboard.
      - key: LLM_API_KEY
        sync: false
      # Strongly recommended on a public URL: shared access token bidders must enter.
      # Leave unset only for a throwaway demo (the platform is OPEN without it).
      - key: ACCESS_TOKEN
        sync: false
      # Optional overrides (sensible defaults live in ats/config.py) — uncomment to use:
      # - key: LLM_BASE_URL
      #   sync: false
      # - key: GENERATE_MODEL
      #   sync: false
      # - key: MATCH_MODEL
      #   sync: false
      # Object storage (Supabase/S3) for persisting generated files + history. DISABLED
      # for now (we use the gist below). To re-enable later, uncomment these and set all
      # four required values in the dashboard. Leave them unset to avoid 500s.
      # - key: S3_ENDPOINT_URL
      #   sync: false
      # - key: S3_REGION
      #   sync: false
      # - key: S3_BUCKET
      #   sync: false
      # - key: S3_ACCESS_KEY_ID
      #   sync: false
      # - key: S3_SECRET_ACCESS_KEY
      #   sync: false
      # Persist ONLY the apply log to a private GitHub gist (active backend).
      # Set both to enable; takes precedence over S3 for the log (PDFs stay ephemeral).
      - key: GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
