<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Bidder Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>ATS Bidder Platform</h1>
    <div id="conn" class="conn"></div>
  </header>

  <!-- Login -->
  <section id="login" class="card hidden">
    <h2>Sign in</h2>
    <p class="muted">Enter the access token your admin gave you.</p>
    <div class="row">
      <input id="token" type="password" placeholder="Access token" autocomplete="off">
      <button id="connect">Connect</button>
    </div>
    <div id="loginError" class="error"></div>
  </section>

  <!-- Main -->
  <main id="app" class="hidden">
    <section class="card">
      <h2>New bid</h2>
      <p class="muted">Copy the job description from the posting and paste it below.</p>
      <textarea id="jd" rows="12" placeholder="Paste the full job description here…"></textarea>
      <div class="row">
        <select id="profile" title="Which candidate to use">
          <option value="">Auto — best match</option>
        </select>
        <label class="check"><input type="checkbox" id="force"> force (allow duplicate)</label>
        <button id="submit">Generate resume</button>
      </div>
    </section>

    <section class="card">
      <h2>Activity</h2>
      <div id="log" class="log"></div>
    </section>

    <section class="card">
      <div class="row between">
        <h2>Applications</h2>
        <button id="refresh" class="ghost">Refresh</button>
      </div>
      <table id="apps">
        <thead>
          <tr><th>#</th><th>Date</th><th>Company</th><th>Job title</th><th>Profile</th><th>Salary</th><th>Files</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
